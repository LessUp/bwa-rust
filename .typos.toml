# Typos 拼写检查配置
# 详见: https://github.com/crate-ci/typos

[files]
extend-exclude = [
    "*.fm",           # 生成的索引文件
    "target/",        # 构建输出
    "node_modules/",  # npm 依赖
    "site/.vitepress/dist/",  # 文档构建输出
    "Cargo.lock",     # Cargo 锁定文件
    "*.snap",         # 快照测试文件
    "*.min.js",       # 压缩的 JS 文件
    "*.map",          # Source map
]

[default]
# 检查二进制文件
check-filename = true

[default.extend-identifiers]
# 允许特定的标识符拼写
SMEM = "SMEM"  # Super-Maximal Exact Matches (bioinformatics term)

[default.extend-words]
# 允许特定的单词
flate = "flate"  # flate2 crate prefix
flate2 = "flate2"  # Rust crate for gzip compression
samse = "samse"  # BWA subcommand for single-end SAM output
sampe = "sampe"  # BWA subcommand for paired-end SAM output
SME = "SME"  # Part of SMEM (Super-Maximal Exact Matches)
PN = "PN"  # SAM @PG program name tag

[type.rs]
# Rust 特定配置
extend-glob = ["*.rs"]

[type.toml]
extend-glob = ["*.toml", "Cargo.lock"]

[type.md]
extend-glob = ["*.md"]
# Markdown 中可能包含特定的拼写
