# FUNDING.yml
# 配置 GitHub 赞助和其他赞助方式
# 详见: https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository

# GitHub Sponsors (启用后取消注释)
# github: [LessUp]

# 其他赞助方式 (根据需要启用)
# patreon: # 你的 Patreon 用户名
# open_collective: # 你的 Open Collective 名称
# ko_fi: # 你的 Ko-fi 用户名
# tidelift: # 包名，如 "cargo/bwa-rust"
# community_bridge: # 项目名，如 "cloud-foundry"
# liberapay: # 你的 Liberapay 用户名
# issuehunt: # 你的 IssueHunt 用户名
# otechie: # 你的 Otechie 用户名
# lfx_crowdfunding: # 项目名，如 "cloud-foundry"
# custom: # 自定义赞助 URL 列表
#   - https://example.com/sponsor
