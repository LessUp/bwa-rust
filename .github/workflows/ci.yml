name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0  # CI 环境禁用增量编译，减少缓存大小
  CARGO_NET_RETRY: 10   # 网络重试次数
  RUSTUP_MAX_RETRIES: 10  # Rustup 重试次数

permissions:
  contents: read
  checks: write        # 用于测试报告

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Code Quality Checks
  # ─────────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check for trailing whitespace
        run: |
          if grep -rI '[[:space:]]$' --include='*.rs' --include='*.md' --include='*.toml' --include='*.yml' src/ docs/ specs/ benches/ tests/ .github/; then
            echo "❌ Found trailing whitespace!"
            exit 1
          fi
          echo "✅ No trailing whitespace found"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "clippy"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─────────────────────────────────────────────────────────────
  # Tests
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.target }}"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run tests
        run: cargo test --all-targets --all-features

  # ─────────────────────────────────────────────────────────────
  # Build
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "build"
          cache-on-failure: true

      - name: Build release
        run: cargo build --release

      - name: Check binary size
        run: |
          echo "=== Binary Size ==="
          ls -lh target/release/bwa-rust || echo "Binary not found"
          echo ""
          echo "=== Stripped Size ==="
          cp target/release/bwa-rust target/release/bwa-rust-unstripped
          strip target/release/bwa-rust
          ls -lh target/release/bwa-rust || echo "Binary not found"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bwa-rust-linux-debug
          path: target/release/bwa-rust
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Docs Build Check
  # ─────────────────────────────────────────────────────────────
  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

  # ─────────────────────────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, build, docs]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" || \
                "${{ needs.clippy.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.docs.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
