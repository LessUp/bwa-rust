name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日 UTC 00:00 运行
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          # Issues 配置
          stale-issue-message: |
            📌 **This issue has been automatically marked as stale** due to 60 days of inactivity.
            
            It will be closed in 7 days if no further activity occurs.
            
            If this issue is still relevant, please comment below to keep it open.
            
            _This is an automated message._
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug,help wanted,good first issue'
          days-before-issue-stale: 60
          days-before-issue-close: 7
          close-issue-message: |
            🔒 **This issue has been closed** due to inactivity.
            
            If you believe this issue is still relevant, please reopen it or create a new issue.
          
          # PR 配置
          stale-pr-message: |
            📌 **This pull request has been automatically marked as stale** due to 30 days of inactivity.
            
            It will be closed in 7 days if no further activity occurs.
            
            If you're still working on this, please comment below to keep it open.
            
            _This is an automated message._
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,WIP'
          days-before-pr-stale: 30
          days-before-pr-close: 7
          close-pr-message: |
            🔒 **This pull request has been closed** due to inactivity.
            
            If you'd like to continue working on this, please reopen it.
          
          # 通用配置
          operations-per-run: 100
          remove-stale-when-updated: true
