name: Release

# 当推送 v* 格式的 tag 时触发（如 v0.1.0, v1.0.0）
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: bwa-rust

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 musl 静态链接（零依赖） ──
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: bwa-rust-linux-amd64-static
            ext: ""

          # ── Linux x86_64 glibc（常规动态链接） ──
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bwa-rust-linux-amd64
            ext: ""

          # ── Windows x86_64 ──
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: bwa-rust-windows-amd64
            ext: ".exe"

          # ── macOS x86_64 ──
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: bwa-rust-macos-amd64
            ext: ""

          # ── macOS Apple Silicon (aarch64) ──
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: bwa-rust-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux musl: 安装 musl-tools（提供 musl-gcc 链接器）
      - name: Install musl-tools (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # 验证 musl 二进制确实是静态链接的
      - name: Verify static linking (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          echo "=== file output ==="
          file target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          echo "=== ldd output ==="
          ldd target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} 2>&1 || true
          echo "=== Checking: should be 'statically linked' ==="
          file target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} | grep -i static

      # 重命名并打包二进制
      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }} \
             ${{ matrix.artifact }}${{ matrix.ext }}
          chmod +x ${{ matrix.artifact }}${{ matrix.ext }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}" `
                    "${{ matrix.artifact }}${{ matrix.ext }}"
          Compress-Archive -Path "${{ matrix.artifact }}${{ matrix.ext }}" `
                           -DestinationPath "${{ matrix.artifact }}.zip"

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # ── 发布 Release ──────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      # 收集所有压缩包到一个目录
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -lh release-assets/

      # 生成 SHA256 校验和
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # 创建 Release 并上传所有资产
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*
          body: |
            ## 安装

            下载对应平台的二进制文件：

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Linux (静态链接)** | `bwa-rust-linux-amd64-static.tar.gz` | musl 静态链接，零依赖，推荐 |
            | **Linux (动态链接)** | `bwa-rust-linux-amd64.tar.gz` | glibc 动态链接 |
            | **Windows** | `bwa-rust-windows-amd64.zip` | Windows x86_64 |
            | **macOS (Intel)** | `bwa-rust-macos-amd64.tar.gz` | macOS x86_64 |
            | **macOS (Apple Silicon)** | `bwa-rust-macos-arm64.tar.gz` | macOS aarch64 |

            ### Linux 快速安装
            ```bash
            # 下载并解压（以 musl 静态版为例）
            tar xzf bwa-rust-linux-amd64-static.tar.gz
            chmod +x bwa-rust-linux-amd64-static
            ./bwa-rust-linux-amd64-static mem reference.fa reads.fq -o output.sam
            ```

            ### 校验文件完整性
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
