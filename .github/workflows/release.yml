name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: bwa-rust

permissions:
  contents: read

jobs:
  verify:
    name: Verify tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Parse version
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          grep -q "^version = \"$VERSION\"" Cargo.toml

      - name: Run release verification
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-targets --all-features

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: bwa-rust-linux-amd64-static
            ext: ''
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bwa-rust-linux-amd64
            ext: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: bwa-rust-windows-amd64
            ext: '.exe'
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: bwa-rust-macos-amd64
            ext: ''
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: bwa-rust-macos-arm64
            ext: ''
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }} ${{ matrix.artifact }}${{ matrix.ext }}
          chmod +x ${{ matrix.artifact }}${{ matrix.ext }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}" "${{ matrix.artifact }}${{ matrix.ext }}"
          Compress-Archive -Path "${{ matrix.artifact }}${{ matrix.ext }}" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  publish:
    name: Publish GitHub release
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir -p release-assets
          find artifacts -name '*.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.zip' -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-assets/*
          prerelease: ${{ contains(needs.verify.outputs.version, '-') }}
