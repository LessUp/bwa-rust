name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: bwa-rust
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Pre-release Checks
  # ─────────────────────────────────────────────────────────────
  verify:
    name: Verify Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse version from tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Releasing version: $VERSION"

      - uses: actions/checkout@v4

      - name: Verify CHANGELOG has version
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "✅ Found version $VERSION in CHANGELOG.md"
          else
            echo "⚠️ Version $VERSION not found in CHANGELOG.md"
            echo "Make sure to update CHANGELOG before releasing"
          fi

  # ─────────────────────────────────────────────────────────────
  # Build Binaries
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 musl (static linking, recommended)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: bwa-rust-linux-amd64-static
            ext: ""

          # Linux x86_64 glibc (dynamic linking)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bwa-rust-linux-amd64
            ext: ""

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: bwa-rust-windows-amd64
            ext: ".exe"

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: bwa-rust-macos-amd64
            ext: ""

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: bwa-rust-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.target }}-release"
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify static linking (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          echo "=== File type ==="
          file target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          echo "=== Dynamic libraries ==="
          ldd target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} 2>&1 || true
          echo "=== Verification ==="
          file target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} | grep -i static

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }} \
             ${{ matrix.artifact }}${{ matrix.ext }}
          chmod +x ${{ matrix.artifact }}${{ matrix.ext }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}" `
                    "${{ matrix.artifact }}${{ matrix.ext }}"
          Compress-Archive -Path "${{ matrix.artifact }}${{ matrix.ext }}" `
                           -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Create Release
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          echo "=== SHA256 Checksums ==="
          cat SHA256SUMS.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          # Extract changelog section for this version
          awk "/## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 > release-notes.md || true
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for version $VERSION" > release-notes.md
          fi
          echo "=== Release Notes ==="
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-assets/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(needs.verify.outputs.version, '-') }}

  # ─────────────────────────────────────────────────────────────
  # Post-release
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Release Summary
    needs: [verify, release]
    runs-on: ubuntu-latest
    steps:
      - name: Print release info
        run: |
          echo "🎉 Release v${{ needs.verify.outputs.version }} published!"
          echo ""
          echo "📦 Downloads:"
          echo "  - Linux (static): bwa-rust-linux-amd64-static.tar.gz"
          echo "  - Linux (dynamic): bwa-rust-linux-amd64.tar.gz"
          echo "  - Windows: bwa-rust-windows-amd64.zip"
          echo "  - macOS (Intel): bwa-rust-macos-amd64.tar.gz"
          echo "  - macOS (ARM): bwa-rust-macos-arm64.tar.gz"
