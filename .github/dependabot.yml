version: 2
updates:
- package-ecosystem: cargo
  directory: /
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 0
  labels:
  - dependencies
  - cargo
  commit-message:
    prefix: chore(deps)
    include: scope
- package-ecosystem: npm
  directory: /
  schedule:
    interval: monthly
  labels:
  - dependencies
  - npm
  commit-message:
    prefix: chore(deps)
    include: scope
  open-pull-requests-limit: 0
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
  labels:
  - dependencies
  - ci
  commit-message:
    prefix: chore(deps)
    include: scope
  open-pull-requests-limit: 0
